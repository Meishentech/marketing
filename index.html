<!DOCTYPE html>
<html lang="zh-TW">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width,initial-scale=1">
<title>美昇舒適科技 · 行銷規劃平台</title>
<link rel="preconnect" href="https://fonts.googleapis.com">
<link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
<link href="https://fonts.googleapis.com/css2?family=Big+Shoulders+Display:wght@600;700;800&family=IBM+Plex+Sans:ital,wght@0,400;0,500;0,600;1,400&family=IBM+Plex+Mono:wght@400;500;600&display=swap" rel="stylesheet">
<style>
*{box-sizing:border-box;margin:0;padding:0}
:root{
  --ink:#12212B;        /* 儀表金屬深藍黑 */
  --paper:#EDF1EF;      /* 冷鋼淺灰紙 */
  --panel:#FFFFFF;
  --teal:#0E7C86;       /* 冷媒／進行中 */
  --teal-deep:#0B4F55;  /* 已結案／完全冷卻 */
  --brass:#B97A3D;      /* 黃銅／估價中 */
  --rust:#9C3B2E;       /* 警示／刪除 */
  --line:#D7DEDA;
  --muted:#5C6B67;
  --text:#12212B;
}
body{font-family:'IBM Plex Sans',system-ui,sans-serif;background:var(--paper);color:var(--text);display:flex;min-height:100vh;font-size:16px}
button{cursor:pointer;font-family:inherit}
input,select,textarea{font-family:inherit}
.mono{font-family:'IBM Plex Mono',monospace}
h1,h2,.display{font-family:'Big Shoulders Display',sans-serif;font-weight:700;letter-spacing:.01em}

/* ── Login ── */
#login-screen{display:flex;position:fixed;inset:0;background:
  linear-gradient(0deg, rgba(18,33,43,.94), rgba(18,33,43,.94)),
  repeating-linear-gradient(0deg, transparent, transparent 39px, rgba(255,255,255,.05) 40px),
  repeating-linear-gradient(90deg, transparent, transparent 39px, rgba(255,255,255,.05) 40px);
  z-index:9999;align-items:center;justify-content:center}
#login-screen.hidden{display:none!important}
.login-box{background:var(--panel);width:380px;max-width:92vw;box-shadow:0 24px 64px rgba(0,0,0,.4);border-top:4px solid var(--teal)}
.login-inner{padding:38px 34px}
.login-mark{display:flex;align-items:center;gap:14px;margin-bottom:22px}
.brand-logo{height:48px;width:auto;flex-shrink:0}
.login-title{font-family:'Big Shoulders Display',sans-serif;font-size:27px;font-weight:800;line-height:1;color:var(--ink)}
.login-sub{font-family:'IBM Plex Mono',monospace;font-size:11px;letter-spacing:.14em;color:var(--muted);margin-top:4px;text-transform:uppercase}
.login-box label{font-family:'IBM Plex Mono',monospace;font-size:11px;letter-spacing:.1em;text-transform:uppercase;color:var(--muted);display:block;margin-bottom:7px;margin-top:18px}
.login-box input{width:100%;padding:12px 13px;border-radius:3px;border:1.5px solid var(--line);font-size:16px;outline:none;background:var(--paper)}
.login-box input:focus{border-color:var(--teal)}
.login-btn{width:100%;padding:14px;background:var(--ink);color:#fff;border:none;font-size:14px;font-weight:600;letter-spacing:.06em;text-transform:uppercase;margin-top:24px}
.login-btn:hover{background:var(--teal-deep)}
.login-btn:disabled{opacity:.5;cursor:not-allowed}
.login-err{font-size:13px;color:var(--rust);margin-top:10px;text-align:center;min-height:18px}

/* ── Shell ── */
#sidebar{width:220px;background:var(--ink);color:#fff;display:none;flex-direction:column;position:fixed;height:100vh;z-index:100}
#main{margin-left:220px;flex:1;padding:30px 34px;min-height:100vh;display:none}
.logo{padding:20px 20px 16px;border-bottom:1px solid rgba(255,255,255,.1);display:flex;flex-direction:column;align-items:flex-start;gap:8px}
.brand-logo-sb{height:32px;width:auto;filter:brightness(0) invert(1)}
.logo small{display:block;font-family:'IBM Plex Mono',monospace;font-size:10px;letter-spacing:.1em;color:#8496a0;text-transform:uppercase}
nav{flex:1;padding:14px 0}
.ni{display:flex;align-items:center;gap:10px;padding:12px 20px;color:#9FB1AC;font-size:15px;cursor:pointer;border-left:3px solid transparent;font-weight:500}
.ni::before{content:'';width:5px;height:5px;border-radius:50%;background:currentColor;opacity:.5;flex-shrink:0}
.ni:hover{color:#fff}
.ni.on{color:#fff;border-left-color:var(--teal);background:rgba(255,255,255,.04)}
.ni.on::before{background:var(--teal);opacity:1}
.sfooter{padding:16px 20px;border-top:1px solid rgba(255,255,255,.1);font-family:'IBM Plex Mono',monospace;font-size:12px;color:#7C8D89;display:flex;justify-content:space-between;align-items:center}
.sfooter button{background:none;border:none;color:#9FB1AC;font-size:12px;font-family:inherit}
.sfooter button:hover{color:#fff}

/* ── Buttons ── */
.btn{display:inline-flex;align-items:center;gap:6px;padding:10px 16px;border-radius:3px;font-size:14px;font-weight:600;border:1.5px solid transparent;letter-spacing:.02em}
.btn-primary{background:var(--ink);color:#fff}
.btn-primary:hover{background:var(--teal-deep)}
.btn-outline{background:var(--panel);color:var(--text);border-color:var(--line)}
.btn-outline:hover{border-color:var(--ink)}
.btn-red{background:var(--panel);color:var(--rust);border-color:var(--rust)}
.btn-red:hover{background:var(--rust);color:#fff}
.btn-sm{padding:7px 12px;font-size:13px}

/* ── Page header ── */
.ph{display:flex;align-items:flex-end;justify-content:space-between;margin-bottom:22px;gap:12px;flex-wrap:wrap;border-bottom:2px solid var(--ink);padding-bottom:14px}
.pt{font-family:'Big Shoulders Display',sans-serif;font-size:32px;font-weight:800;line-height:1}
.ps{font-family:'IBM Plex Mono',monospace;font-size:13px;color:var(--muted);margin-top:6px;letter-spacing:.02em}

/* ── Cards / panels ── */
.card{background:var(--panel);padding:20px 22px;border:1px solid var(--line)}

/* KPI gauge strip */
.kpi-strip{background:var(--ink);color:#fff;padding:22px;margin-bottom:16px;display:flex;gap:0;flex-wrap:wrap}
.kpi-seg{flex:1;min-width:120px;padding:0 22px;border-left:1px solid rgba(255,255,255,.12)}
.kpi-seg:first-child{border-left:none;padding-left:0}
.kpi-label{font-family:'IBM Plex Mono',monospace;font-size:11px;letter-spacing:.12em;text-transform:uppercase;color:#8496A0}
.kpi-val{font-family:'Big Shoulders Display',sans-serif;font-size:38px;font-weight:700;line-height:1.15;margin-top:2px}
.kpi-bar{height:5px;background:rgba(255,255,255,.12);margin-top:10px;position:relative;overflow:hidden}
.kpi-bar i{display:block;height:100%}

.stat-row{display:grid;grid-template-columns:1fr 1fr;gap:16px;margin-bottom:16px}
.stat-box{background:var(--panel);border:1px solid var(--line);padding:18px 20px}
.stat-box .kpi-label{color:var(--muted)}
.stat-box .stat-num{font-family:'IBM Plex Mono',monospace;font-size:26px;font-weight:600;margin-top:5px;color:var(--ink)}
.stat-box .kpi-bar{background:var(--line)}

/* status thermal tag */
.tag{display:inline-flex;align-items:center;gap:6px;font-family:'IBM Plex Mono',monospace;font-size:12px;letter-spacing:.06em;text-transform:uppercase;font-weight:600}
.tag::before{content:'';width:8px;height:8px;flex-shrink:0}
.tag-brass{color:var(--brass)}.tag-brass::before{background:var(--brass)}
.tag-teal{color:var(--teal)}.tag-teal::before{background:var(--teal)}
.tag-deep{color:var(--teal-deep)}.tag-deep::before{background:var(--teal-deep)}
.tag-muted{color:var(--muted)}.tag-muted::before{background:var(--muted)}

/* campaign / list rows (dashboard「最近更新」用) */
.rowlist{display:flex;flex-direction:column;gap:1px;background:var(--line);border:1px solid var(--line)}
.rowcard{background:var(--panel);border-left:4px solid var(--line);display:flex;align-items:center;justify-content:space-between;padding:16px 18px;cursor:pointer;gap:14px}
.rowcard:hover{background:#F5F8F6}
.rowcard.st-brass{border-left-color:var(--brass)}
.rowcard.st-teal{border-left-color:var(--teal)}
.rowcard.st-deep{border-left-color:var(--teal-deep)}
.row-info{flex:1;min-width:0}
.row-name{font-size:16px;font-weight:600}
.row-right{text-align:right;flex-shrink:0}
.row-amt{font-family:'IBM Plex Mono',monospace;font-size:15px;font-weight:600;margin-bottom:5px}

/* 總表 table */
.tw{overflow-x:auto;border:1px solid var(--line);background:var(--panel)}
table{width:100%;border-collapse:collapse}
th{padding:12px 16px;text-align:left;font-family:'IBM Plex Mono',monospace;font-size:11px;letter-spacing:.08em;text-transform:uppercase;color:var(--muted);background:var(--paper);border-bottom:1px solid var(--line);white-space:nowrap}
td{padding:14px 16px;border-bottom:1px solid var(--paper);font-size:16px;vertical-align:middle}
tbody tr{cursor:pointer}
tbody tr:hover td{background:#F5F8F6}
tbody tr:last-child td{border-bottom:none}
.tb-name{font-weight:600}
.tb-amt{white-space:nowrap;font-size:15px}

/* 詳情頁 */
.detail-grid{display:grid;grid-template-columns:1fr 1fr;gap:14px}
.detail-block{display:flex;flex-direction:column;gap:8px}
.detail-text{font-size:16px;line-height:1.6;white-space:pre-wrap}
.detail-timeline{display:flex;gap:28px;flex-wrap:wrap;font-size:16px}
.muted-text{color:var(--muted);font-size:14px}

/* gantt strip-chart */
.gantt-panel{background:var(--panel);border:1px solid var(--line);padding:18px 20px;overflow-x:auto}
.gantt-hd{display:flex;justify-content:space-between;align-items:center;margin-bottom:14px;flex-wrap:wrap;gap:8px}
.gantt-hd .pt2{font-family:'Big Shoulders Display',sans-serif;font-size:19px;font-weight:700}
.gantt-legend{display:flex;gap:14px;font-family:'IBM Plex Mono',monospace;font-size:11px;text-transform:uppercase;letter-spacing:.06em}
.gantt-row{display:grid;grid-template-columns:170px 1fr;align-items:center;gap:10px;padding:8px 0;border-bottom:1px solid var(--paper)}
.gantt-name{font-size:14px;font-weight:600;overflow:hidden;white-space:nowrap;text-overflow:ellipsis;cursor:pointer}
.gantt-name:hover{color:var(--teal)}
.gantt-track{position:relative;height:24px;background:
  repeating-linear-gradient(90deg, var(--line), var(--line) 1px, transparent 1px, transparent calc(100%/12));}
.gantt-bar{position:absolute;height:100%;display:flex;align-items:center;padding:0 7px;font-family:'IBM Plex Mono',monospace;font-size:10.5px;color:#fff;white-space:nowrap;overflow:hidden}

/* Modal */
.mo{display:none;position:fixed;inset:0;background:rgba(18,33,43,.55);z-index:1000;align-items:flex-start;justify-content:center;padding-top:40px;overflow-y:auto}
.mo.open{display:flex}
.md{background:var(--panel);width:90%;max-width:640px;max-height:calc(100vh - 80px);overflow-y:auto;box-shadow:0 20px 60px rgba(0,0,0,.3);border-top:4px solid var(--teal)}
.mh{padding:18px 22px;border-bottom:1px solid var(--line);display:flex;align-items:center;justify-content:space-between;position:sticky;top:0;background:var(--panel)}
.mt{font-family:'Big Shoulders Display',sans-serif;font-size:21px;font-weight:700}
.mc{background:none;border:none;font-size:24px;color:var(--muted);line-height:1}
.mc:hover{color:var(--ink)}
.mb{padding:20px 22px}
.mf{padding:14px 22px;border-top:1px solid var(--line);display:flex;justify-content:flex-end;gap:8px;flex-wrap:wrap}

/* Form */
.fg{display:grid;grid-template-columns:1fr 1fr;gap:14px}
.ff{grid-column:1/-1}
.fg1{display:flex;flex-direction:column;gap:6px}
.fl{font-family:'IBM Plex Mono',monospace;font-size:11px;letter-spacing:.08em;text-transform:uppercase;color:var(--muted)}
.fg1 input,.fg1 select,.fg1 textarea{padding:10px 12px;border-radius:3px;border:1.5px solid var(--line);font-size:15px;background:var(--paper)}
.fg1 input:focus,.fg1 select:focus,.fg1 textarea:focus{outline:none;border-color:var(--teal)}
.fg1 textarea{resize:vertical;min-height:76px}

.loading{text-align:center;padding:60px;color:var(--muted);font-size:13px;font-family:'IBM Plex Mono',monospace;text-transform:uppercase;letter-spacing:.08em}
.empty{text-align:center;padding:48px;color:var(--muted);font-size:15px;border:1px dashed var(--line)}

/* ── Responsive ── */
@media (max-width: 760px){
  body{display:block;font-size:16px}
  #sidebar{position:static;width:100%;height:auto;flex-direction:row;flex-wrap:wrap;align-items:center;padding:4px 0}
  .logo{border-bottom:none;padding:12px 14px}
  .logo small{display:none}
  nav{display:flex;flex:1 1 auto;min-width:0;padding:0 8px 10px;overflow-x:auto}
  .ni{border-left:none;border-bottom:3px solid transparent;padding:10px 12px;white-space:nowrap}
  .ni.on{border-left-color:transparent;border-bottom-color:var(--teal)}
  .sfooter{border-top:none;margin-left:auto;padding:10px 14px}
  #main{margin-left:0;padding:18px 16px}
  .fg{grid-template-columns:1fr}
  .stat-row{grid-template-columns:1fr}
  .detail-grid{grid-template-columns:1fr}
  .kpi-strip{gap:14px}
  .kpi-seg{border-left:none;padding-left:0;min-width:45%}
  .gantt-row{grid-template-columns:110px 1fr}
  .md{width:100%;max-width:none}
  th,td{padding:11px 12px;font-size:15px}
  .pt{font-size:26px}
}
</style>
</head>
<body>

<div id="login-screen">
  <div class="login-box">
    <div class="login-inner">
      <div class="login-mark">
        <img src="assets/logo.png" alt="美昇" class="brand-logo">
        <div>
          <div class="login-title">美昇舒適科技</div>
          <div class="login-sub">Marketing Ops Console</div>
        </div>
      </div>
      <label>帳號</label>
      <input id="li-email" type="email" placeholder="you@example.com">
      <label>密碼</label>
      <input id="li-pw" type="password" placeholder="••••••••" onkeydown="if(event.key==='Enter')doLogin()">
      <button class="login-btn" id="li-btn" onclick="doLogin()">登入</button>
      <div class="login-err" id="li-err"></div>
    </div>
  </div>
</div>

<div id="sidebar">
  <div class="logo">
    <img src="assets/logo.png" alt="美昇" class="brand-logo-sb">
    <small>美昇舒適科技 · Marketing Ops</small>
  </div>
  <nav>
    <div class="ni" data-view="dashboard" onclick="nav('dashboard')">總覽</div>
    <div class="ni" data-view="campaigns" onclick="nav('campaigns')">行銷案管理</div>
    <div class="ni" data-view="news" onclick="nav('news')">新聞蒐集</div>
    <div class="ni" data-view="drafts" onclick="nav('drafts')">每週文案彙整</div>
  </nav>
  <div class="sfooter"><span id="sb-user" class="mono"></span><button onclick="doLogout()">登出</button></div>
</div>

<div id="main"><div id="vc"></div></div>

<!-- 行銷案 modal -->
<div class="mo" id="mcampaign">
  <div class="md">
    <div class="mh"><div class="mt" id="cm-title">新增行銷案</div><button class="mc" onclick="closeM('mcampaign')">×</button></div>
    <div class="mb">
      <div class="fg">
        <div class="fg1 ff"><label class="fl">專案名稱 *</label><input id="cm-name"></div>
        <div class="fg1 ff"><label class="fl">專案說明</label><textarea id="cm-purpose"></textarea></div>
        <div class="fg1"><label class="fl">進度</label>
          <select id="cm-status"><option>估價</option><option>進行中</option><option>結案</option></select>
        </div>
        <div class="fg1"></div>
        <div class="fg1"><label class="fl">專案總預算</label><input id="cm-budget" type="number"></div>
        <div class="fg1"><label class="fl">實際花費</label><input id="cm-actual" type="number"></div>
        <div class="fg1"><label class="fl">預計開始</label><input id="cm-pstart" type="date"></div>
        <div class="fg1"><label class="fl">預計結束</label><input id="cm-pend" type="date"></div>
        <div class="fg1"><label class="fl">實際開始</label><input id="cm-astart" type="date"></div>
        <div class="fg1"><label class="fl">實際結束</label><input id="cm-aend" type="date"></div>
        <div class="fg1"><label class="fl">負責人</label><input id="cm-owner"></div>
        <div class="fg1"><label class="fl">負責單位（主要配合單位）</label>
          <select id="cm-unit" onchange="onUnitSelectChange()"></select>
        </div>
        <div class="fg1 ff" id="cm-unit-new-wrap" style="display:none">
          <label class="fl">新單位名稱</label><input id="cm-unit-new" placeholder="輸入新的負責單位名稱">
        </div>
        <div class="fg1 ff">
          <label class="fl">負責公司（外包，可新增多筆）</label>
          <div id="cm-vendors-list"></div>
          <button type="button" class="btn btn-outline btn-sm" style="margin-top:8px;align-self:flex-start" onclick="addVendorRow()">＋ 新增外包公司</button>
        </div>
        <div class="fg1 ff"><label class="fl">備註</label><textarea id="cm-notes"></textarea></div>
      </div>
    </div>
    <div class="mf">
      <button class="btn btn-red" id="cm-delete" onclick="delCampaign()">刪除</button>
      <button class="btn btn-outline" onclick="closeM('mcampaign')">取消</button>
      <button class="btn btn-primary" onclick="saveCampaign()">儲存</button>
    </div>
  </div>
</div>

<!-- 文案 modal -->
<div class="mo" id="mdraft">
  <div class="md">
    <div class="mh"><div class="mt" id="dm-title-label">新增文案</div><button class="mc" onclick="closeM('mdraft')">×</button></div>
    <div class="mb">
      <div class="fg">
        <div class="fg1"><label class="fl">所屬週（週一）</label><input id="dm-week" type="date"></div>
        <div class="fg1"><label class="fl">關聯行銷案</label><select id="dm-campaign"></select></div>
        <div class="fg1 ff"><label class="fl">標題</label><input id="dm-title"></div>
        <div class="fg1 ff"><label class="fl">文案內容 *</label><textarea id="dm-content" style="min-height:140px"></textarea></div>
        <div class="fg1 ff"><label class="fl">參考來源／靈感（新聞連結等，手動貼上）</label><input id="dm-source"></div>
        <div class="fg1"><label class="fl">狀態</label>
          <select id="dm-status"><option>草稿</option><option>已採用</option><option>已發布</option></select>
        </div>
      </div>
    </div>
    <div class="mf">
      <button class="btn btn-red" id="dm-delete" onclick="delDraft()">刪除</button>
      <button class="btn btn-outline" onclick="closeM('mdraft')">取消</button>
      <button class="btn btn-primary" onclick="saveDraft()">儲存</button>
    </div>
  </div>
</div>

<script src="core/config.js"></script>
<script src="core/api.js"></script>
<script src="core/auth.js"></script>
<script src="app.js"></script>
<script>
(async function init(){
  if (await checkAuth()) { await showApp(); await nav('dashboard'); }
})();
</script>
</body>
</html>
