<!DOCTYPE html>
<html lang="zh-TW">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width,initial-scale=1">
<title>美昇舒適科技 · 行銷規劃平台</title>
<style>
*{box-sizing:border-box;margin:0;padding:0}
:root{--bg:#F1F5F9;--sidebar:#0F172A;--primary:#3B82F6;--green:#10B981;--amber:#F59E0B;--red:#EF4444;--text:#1E293B;--muted:#64748B;--border:#E2E8F0}
body{font-family:'Segoe UI',system-ui,sans-serif;background:var(--bg);color:var(--text);display:flex;min-height:100vh}
button{cursor:pointer;font-family:inherit}
input,select,textarea{font-family:inherit}

#login-screen{display:flex;position:fixed;inset:0;background:linear-gradient(135deg,#0F172A 0%,#1e3a5f 100%);z-index:9999;align-items:center;justify-content:center}
#login-screen.hidden{display:none!important}
.login-box{background:#fff;border-radius:18px;padding:40px 44px;width:380px;box-shadow:0 24px 64px rgba(0,0,0,.35)}
.login-title{font-size:22px;font-weight:800;color:#3B82F6}
.login-sub{font-size:13px;color:var(--muted);margin-bottom:28px}
.login-box label{font-size:12px;font-weight:600;color:var(--muted);display:block;margin-bottom:5px}
.login-box input{width:100%;padding:10px 13px;border-radius:8px;border:1.5px solid var(--border);font-size:14px;margin-bottom:14px;outline:none}
.login-box input:focus{border-color:var(--primary)}
.login-btn{width:100%;padding:12px;background:var(--primary);color:#fff;border:none;border-radius:9px;font-size:15px;font-weight:700}
.login-btn:disabled{opacity:.6;cursor:not-allowed}
.login-err{font-size:12px;color:var(--red);margin-top:8px;text-align:center;min-height:18px}

#sidebar{width:210px;background:var(--sidebar);color:#fff;display:none;flex-direction:column;position:fixed;height:100vh;z-index:100}
#main{margin-left:210px;flex:1;padding:24px;min-height:100vh;display:none}
.logo{padding:20px 18px 14px;border-bottom:1px solid #1e293b}
.logo b{font-size:16px;font-weight:800}
.logo small{display:block;font-size:11px;color:#64748b;margin-top:2px}
nav{flex:1;padding:10px 0}
.ni{display:flex;align-items:center;gap:9px;padding:9px 18px;color:#94a3b8;font-size:13px;cursor:pointer;border-left:3px solid transparent}
.ni:hover,.ni.on{background:#1e293b;color:#fff}
.ni.on{border-left-color:var(--primary)}
.sfooter{padding:14px 18px;border-top:1px solid #1e293b;font-size:11px;color:#475569;display:flex;justify-content:space-between;align-items:center}
.sfooter button{background:none;border:none;color:#94a3b8;font-size:11px}

.btn{display:inline-flex;align-items:center;gap:5px;padding:7px 14px;border-radius:7px;font-size:13px;font-weight:500;border:none}
.btn-primary{background:var(--primary);color:#fff}
.btn-outline{background:#fff;color:var(--text);border:1px solid var(--border)}
.btn-red{background:var(--red);color:#fff}
.btn-sm{padding:4px 9px;font-size:12px}

.ph{display:flex;align-items:center;justify-content:space-between;margin-bottom:20px;gap:12px;flex-wrap:wrap}
.pt{font-size:21px;font-weight:700}
.ps{font-size:12px;color:var(--muted);margin-top:2px}
.card{background:#fff;border-radius:11px;padding:18px;border:1px solid var(--border)}
.sg{display:grid;grid-template-columns:repeat(4,1fr);gap:14px;margin-bottom:20px}
.sc{background:#fff;border-radius:11px;padding:18px;border:1px solid var(--border)}
.sl{font-size:12px;color:var(--muted);margin-bottom:4px}
.sv{font-size:24px;font-weight:700}
.ss{font-size:11px;color:var(--muted);margin-top:3px}

.badge{display:inline-block;padding:2px 9px;border-radius:20px;font-size:11px;font-weight:500;white-space:nowrap}
.bb{background:#eff6ff;color:#3b82f6}.bg{background:#ecfdf5;color:#059669}
.ba{background:#fffbeb;color:#d97706}.bx{background:#f1f5f9;color:#475569}

.proj-list{display:flex;flex-direction:column;gap:10px}
.proj-card{background:#fff;border-radius:12px;border:1px solid var(--border);overflow:hidden}
.proj-top{display:flex;align-items:flex-start;justify-content:space-between;padding:16px 18px;cursor:pointer;gap:12px}
.proj-top:hover{background:#f8fafc}
.proj-info{flex:1;min-width:0}
.proj-name{font-size:15px;font-weight:700;margin-bottom:4px}
.proj-meta{font-size:12px;color:var(--muted)}
.proj-right{text-align:right;flex-shrink:0}
.proj-amt{font-size:16px;font-weight:800;color:var(--primary);margin-bottom:4px}

.mo{display:none;position:fixed;inset:0;background:rgba(0,0,0,.45);z-index:1000;align-items:flex-start;justify-content:center;padding-top:40px;overflow-y:auto}
.mo.open{display:flex}
.md{background:#fff;border-radius:14px;width:90%;max-width:620px;max-height:calc(100vh - 80px);overflow-y:auto;box-shadow:0 20px 60px rgba(0,0,0,.2)}
.mh{padding:18px 22px;border-bottom:1px solid var(--border);display:flex;align-items:center;justify-content:space-between;position:sticky;top:0;background:#fff}
.mt{font-size:16px;font-weight:700}
.mc{background:none;border:none;font-size:22px;color:var(--muted);line-height:1}
.mb{padding:20px 22px}
.mf{padding:14px 22px;border-top:1px solid var(--border);display:flex;justify-content:flex-end;gap:8px}

.fg{display:grid;grid-template-columns:1fr 1fr;gap:14px}
.ff{grid-column:1/-1}
.fg1{display:flex;flex-direction:column;gap:5px}
.fl{font-size:12px;font-weight:500}
.fg1 input,.fg1 select,.fg1 textarea{padding:8px 11px;border-radius:7px;border:1px solid var(--border);font-size:13px}
.fg1 textarea{resize:vertical;min-height:70px}

.loading{text-align:center;padding:60px;color:var(--muted);font-size:13px}
</style>
</head>
<body>

<div id="login-screen">
  <div class="login-box">
    <div class="login-title">美昇舒適科技</div>
    <div class="login-sub">行銷規劃平台</div>
    <label>帳號</label>
    <input id="li-email" type="email" placeholder="you@example.com">
    <label>密碼</label>
    <input id="li-pw" type="password" placeholder="••••••••" onkeydown="if(event.key==='Enter')doLogin()">
    <button class="login-btn" id="li-btn" onclick="doLogin()">登入</button>
    <div class="login-err" id="li-err"></div>
  </div>
</div>

<div id="sidebar">
  <div class="logo"><b>美昇舒適科技</b><small>行銷規劃平台</small></div>
  <nav>
    <div class="ni" data-view="dashboard" onclick="nav('dashboard')">📊 總覽</div>
    <div class="ni" data-view="campaigns" onclick="nav('campaigns')">📋 行銷案管理</div>
    <div class="ni" data-view="drafts" onclick="nav('drafts')">📝 每週文案彙整</div>
  </nav>
  <div class="sfooter"><span id="sb-user"></span><button onclick="doLogout()">登出</button></div>
</div>

<div id="main"><div id="vc"></div></div>

<!-- 行銷案 modal -->
<div class="mo" id="mcampaign">
  <div class="md">
    <div class="mh"><div class="mt" id="cm-title">新增行銷案</div><button class="mc" onclick="closeM('mcampaign')">×</button></div>
    <div class="mb">
      <div class="fg">
        <div class="fg1 ff"><label class="fl">專案名稱 *</label><input id="cm-name"></div>
        <div class="fg1"><label class="fl">專案總預算</label><input id="cm-budget" type="number"></div>
        <div class="fg1"><label class="fl">實際花費</label><input id="cm-actual" type="number"></div>
        <div class="fg1"><label class="fl">配合單位</label><input id="cm-partner"></div>
        <div class="fg1"><label class="fl">委託第三方</label><input id="cm-vendor"></div>
        <div class="fg1 ff"><label class="fl">預期目的</label><input id="cm-purpose"></div>
        <div class="fg1"><label class="fl">進度</label>
          <select id="cm-status"><option>估價</option><option>進行中</option><option>結案</option></select>
        </div>
        <div class="fg1"></div>
        <div class="fg1"><label class="fl">預計開始</label><input id="cm-pstart" type="date"></div>
        <div class="fg1"><label class="fl">預計結束</label><input id="cm-pend" type="date"></div>
        <div class="fg1"><label class="fl">實際開始</label><input id="cm-astart" type="date"></div>
        <div class="fg1"><label class="fl">實際結束</label><input id="cm-aend" type="date"></div>
        <div class="fg1 ff"><label class="fl">備註</label><textarea id="cm-notes"></textarea></div>
      </div>
    </div>
    <div class="mf">
      <button class="btn btn-red" id="cm-delete" onclick="delCampaign()">刪除</button>
      <button class="btn btn-outline" onclick="closeM('mcampaign')">取消</button>
      <button class="btn btn-primary" onclick="saveCampaign()">儲存</button>
    </div>
  </div>
</div>

<!-- 文案 modal -->
<div class="mo" id="mdraft">
  <div class="md">
    <div class="mh"><div class="mt" id="dm-title-label">新增文案</div><button class="mc" onclick="closeM('mdraft')">×</button></div>
    <div class="mb">
      <div class="fg">
        <div class="fg1"><label class="fl">所屬週（週一）</label><input id="dm-week" type="date"></div>
        <div class="fg1"><label class="fl">關聯行銷案</label><select id="dm-campaign"></select></div>
        <div class="fg1 ff"><label class="fl">標題</label><input id="dm-title"></div>
        <div class="fg1 ff"><label class="fl">文案內容 *</label><textarea id="dm-content" style="min-height:140px"></textarea></div>
        <div class="fg1 ff"><label class="fl">參考來源／靈感（新聞連結等，手動貼上）</label><input id="dm-source"></div>
        <div class="fg1"><label class="fl">狀態</label>
          <select id="dm-status"><option>草稿</option><option>已採用</option><option>已發布</option></select>
        </div>
      </div>
    </div>
    <div class="mf">
      <button class="btn btn-red" id="dm-delete" onclick="delDraft()">刪除</button>
      <button class="btn btn-outline" onclick="closeM('mdraft')">取消</button>
      <button class="btn btn-primary" onclick="saveDraft()">儲存</button>
    </div>
  </div>
</div>

<script src="core/config.js"></script>
<script src="core/api.js"></script>
<script src="core/auth.js"></script>
<script src="app.js"></script>
<script>
(async function init(){
  if (await checkAuth()) { await showApp(); await nav('dashboard'); }
})();
</script>
</body>
</html>
